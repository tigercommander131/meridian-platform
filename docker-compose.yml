# PARASOL EMS — full stack (Postgres + backend + frontend).
# Quick start:  cp .env.example .env  &&  docker compose up --build
# Seed demo data once the stack is healthy:  docker compose exec backend npm run seed
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parasol_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-parasol_ems}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parasol_dev} -d ${POSTGRES_DB:-parasol_ems}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-parasol_dev}:${POSTGRES_PASSWORD:-dev_password}@db:5432/${POSTGRES_DB:-parasol_ems}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_too_in_production}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
